<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Pong Game</h1>
        <div class="scoreboard">
            <div class="score">
                <p>Player</p>
                <p id="playerScore">0</p>
            </div>
            <div class="score">
                <p>Computer</p>
                <p id="computerScore">0</p>
            </div>
        </div>
        
        <div class="game-board">
            <!-- Left Paddle (Player) -->
            <div id="playerPaddle" class="paddle player-paddle"></div>
            
            <!-- Ball -->
            <div id="ball" class="ball"></div>
            
            <!-- Right Paddle (Computer) -->
            <div id="computerPaddle" class="paddle computer-paddle"></div>
            
            <!-- Center Line -->
            <div class="center-line"></div>
        </div>
        
        <div class="controls">
            <p>Controls: Mouse Y position or Arrow Keys (Up/Down) to move left paddle</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
